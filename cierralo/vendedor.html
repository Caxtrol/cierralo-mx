<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#09090F">
<title>Ciérralo.mx — Perfil del vendedor</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#09090F;--s1:#111118;--s2:#18181F;--s3:#202029;
  --border:#2E2E42;--border2:#3A3A52;
  --orange:#FF6B35;--orangeD:#CC4A1A;--orangeBg:#FF6B3514;
  --green:#22C55E;--greenBg:#22C55E14;
  --blue:#4A9EFF;--blueBg:#4A9EFF14;
  --yellow:#F59E0B;--yellowBg:#F59E0B14;
  --text:#F0F0FA;--text2:#9090B0;--text3:#58587A;
  --r:16px;--rs:10px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ── TOP BAR ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:10;backdrop-filter:blur(10px);}
.topbar-logo{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--text);}
.topbar-logo span{color:var(--orange);}
.topbar-cta{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--orange);background:var(--orangeBg);border:1px solid #FF6B3530;border-radius:20px;padding:5px 12px;text-decoration:none;letter-spacing:.3px;}

/* ── HERO ── */
.hero{padding:28px 20px 20px;max-width:600px;margin:0 auto;}
.hero-av{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--orange),var(--orangeD));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:28px;color:white;margin-bottom:14px;flex-shrink:0;position:relative;}
.hero-av::after{content:'';position:absolute;inset:-3px;border-radius:50%;border:2px solid #FF6B3540;pointer-events:none;}
.hero-name{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--text);line-height:1.1;margin-bottom:4px;}
.hero-agency{font-size:14px;color:var(--text2);margin-bottom:12px;}
.hero-badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;}
.hbadge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:.3px;}
.hbadge-green{background:var(--greenBg);color:var(--green);border:1px solid #22C55E30;}
.hbadge-orange{background:var(--orangeBg);color:var(--orange);border:1px solid #FF6B3530;}
.hbadge-blue{background:var(--blueBg);color:var(--blue);border:1px solid #4A9EFF30;}
.hero-bio{font-size:14px;color:var(--text2);line-height:1.6;}

/* ── STATS BAR ── */
.stats-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin:0 20px 16px;max-width:560px;margin-left:auto;margin-right:auto;}
.stat-cell{background:var(--s1);padding:14px 8px;text-align:center;}
.stat-val{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--orange);}
.stat-lbl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-top:2px;}

/* ── SCORE CARD ── */
.score-card{margin:0 20px 16px;max-width:560px;margin-left:auto;margin-right:auto;background:linear-gradient(135deg,#22C55E10,var(--s1));border:1px solid #22C55E30;border-radius:var(--r);padding:16px;}
.score-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.score-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--green);}
.score-num{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:var(--green);}
.score-bar-bg{height:6px;background:var(--s3);border-radius:3px;overflow:hidden;}
.score-bar-fill{height:100%;background:linear-gradient(90deg,var(--green),#4ADE80);border-radius:3px;transition:width 1s ease;}
.score-desc{font-size:11px;color:var(--text3);margin-top:6px;}

/* ── SECCIONES ── */
.section{margin:0 20px 16px;max-width:560px;margin-left:auto;margin-right:auto;}
.section-title{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.info-cell{background:var(--s1);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px;}
.info-cell-icon{font-size:20px;margin-bottom:6px;}
.info-cell-val{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px;}
.info-cell-lbl{font-size:10px;color:var(--text3);}

/* ── RESEÑAS ── */
.resena-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--rs);padding:14px;margin-bottom:8px;}
.resena-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.resena-stars{color:var(--yellow);font-size:14px;letter-spacing:1px;}
.resena-auto{font-size:10px;color:var(--text3);}
.resena-txt{font-size:13px;color:var(--text2);line-height:1.5;}
.resena-empty{text-align:center;padding:24px;background:var(--s1);border:1px dashed var(--border2);border-radius:var(--rs);color:var(--text3);font-size:13px;}

/* ── CTA FINAL ── */
.cta-section{margin:0 20px 32px;max-width:560px;margin-left:auto;margin-right:auto;}
.cta-card{background:linear-gradient(135deg,#FF6B3518,var(--s1));border:1px solid #FF6B3535;border-radius:var(--r);padding:20px;text-align:center;}
.cta-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--text);margin-bottom:6px;}
.cta-sub{font-size:12px;color:var(--text2);margin-bottom:16px;line-height:1.5;}
.cta-btn{display:block;background:var(--orange);color:white;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;padding:13px 20px;border-radius:var(--rs);text-decoration:none;margin-bottom:8px;transition:all .15s;}
.cta-btn:active{transform:scale(.98);}
.cta-btn-sec{display:block;background:var(--s2);color:var(--text2);font-family:'Syne',sans-serif;font-weight:700;font-size:12px;padding:10px 20px;border-radius:var(--rs);text-decoration:none;border:1px solid var(--border);}

/* ── FOOTER ── */
.footer{border-top:1px solid var(--border);padding:16px 20px;text-align:center;}
.footer-txt{font-size:11px;color:var(--text3);}
.footer-logo{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--text2);}
.footer-logo span{color:var(--orange);}

/* ── ESTADOS ── */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:12px;}
.loading-dot{width:8px;height:8px;border-radius:50%;background:var(--orange);animation:pulse 1.2s ease-in-out infinite;}
.loading-dot:nth-child(2){animation-delay:.2s;}
.loading-dot:nth-child(3){animation-delay:.4s;}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(.8);}50%{opacity:1;transform:scale(1.2);}}
.loading-row{display:flex;gap:8px;}
.not-found{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;padding:20px;}
.not-found-icon{font-size:48px;margin-bottom:12px;}
.not-found-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin-bottom:6px;}
.not-found-sub{font-size:13px;color:var(--text2);}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.fade-up{animation:fadeUp .4s ease forwards;}
.fade-up-2{animation:fadeUp .4s .1s ease both;}
.fade-up-3{animation:fadeUp .4s .2s ease both;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">Ciérralo<span>.mx</span></div>
  <a href="https://transcendent-florentine-31c783.netlify.app" class="topbar-cta">Soy vendedor →</a>
</div>

<div id="content">
  <div class="loading">
    <div class="loading-row">
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
    </div>
    <div style="font-size:12px;color:var(--text3);">Cargando perfil...</div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://nkjradximipkrzscgvhv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_53Uf0nvrDI8I0iVRqgDA7g_4RJDPl3j';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

// ── Leer slug de la URL ──
// Con dominio propio: cierralo.mx/antonio-castro
// Netlify sirve vendedor.html pero la URL visible sigue siendo /antonio-castro
function getSlug(){
  // Primero intentar desde pathname: /antonio-castro → antonio-castro
  const path = window.location.pathname.replace(/^\//, '').replace(/\/$/, '').trim();
  if(path && path !== 'vendedor.html') return path;
  // Fallback: query param ?v=antonio-castro (para pruebas locales)
  const params = new URLSearchParams(window.location.search);
  return params.get('v') || '';
}

function estrellas(n){
  return '★'.repeat(Math.min(5,Math.max(0,n))) + '☆'.repeat(5 - Math.min(5,Math.max(0,n)));
}

async function cargarPerfil(){
  const slug = getSlug();
  const content = document.getElementById('content');

  if(!slug){
    content.innerHTML = `
      <div class="not-found">
        <div class="not-found-icon">🔍</div>
        <div class="not-found-title">Perfil no especificado</div>
        <div class="not-found-sub">La URL no tiene un vendedor indicado.</div>
      </div>`;
    return;
  }

  // Buscar vendedor por slug
  const { data: v, error } = await sb
    .from('vendedores')
    .select('id,nombre,agencia,ciudad,bio,anos_experiencia,especialidades,marcas_experiencia,score_reputacion,total_ventas_verified,total_resenas,pct_recomendacion,telefono,perfil_publico_activo,perfil_slug')
    .eq('perfil_slug', slug)
    .eq('perfil_publico_activo', true)
    .single();

  if(error || !v){
    content.innerHTML = `
      <div class="not-found">
        <div class="not-found-icon">😕</div>
        <div class="not-found-title">Perfil no encontrado</div>
        <div class="not-found-sub">Este vendedor no tiene perfil público activo o la URL es incorrecta.</div>
      </div>`;
    return;
  }

  // Cargar reseñas del vendedor
  const { data: resenas } = await sb
    .from('resenas')
    .select('calificacion,comentario,auto_comprado,recomienda,anonima,nombre_cliente,created_at')
    .eq('vendedor_id', v.id)
    .eq('visible', true)
    .order('created_at', { ascending: false })
    .limit(5);

  // Cargar autos disponibles (los marcados para perfil público)
  const { data: autos } = await sb
    .from('autos')
    .select('marca,modelo,anio,precio_lista,mensualidad_min,color')
    .eq('vendedor_id', v.id)
    .eq('estado', 'disponible')
    .limit(4);

  // Calcular iniciales
  const iniciales = (v.nombre || 'VV').split(' ').map(n=>n[0]).join('').substring(0,2).toUpperCase();
  const score = Math.round(v.score_reputacion || 0);
  const pct   = Math.round(v.pct_recomendacion || 0);
  const wa    = v.telefono ? v.telefono.replace(/[^0-9]/g,'') : '';

  // Actualizar título de página
  document.title = `${v.nombre} — Ciérralo.mx`;

  // ── Renderizar perfil ──
  content.innerHTML = `

    <div class="hero fade-up">
      <div style="display:flex;align-items:flex-start;gap:16px;margin-bottom:14px;">
        <div class="hero-av">${iniciales}</div>
        <div style="flex:1;padding-top:4px;">
          <div class="hero-name">${v.nombre || 'Vendedor'}</div>
          <div class="hero-agency">${v.agencia || ''} ${v.ciudad ? '· ' + v.ciudad : ''}</div>
          <div class="hero-badges">
            ${v.anos_experiencia ? `<div class="hbadge hbadge-orange">⚡ ${v.anos_experiencia} años</div>` : ''}
            ${v.especialidades ? `<div class="hbadge hbadge-blue">🎯 ${v.especialidades}</div>` : ''}
            ${pct >= 80 ? `<div class="hbadge hbadge-green">👍 ${pct}% recomiendan</div>` : ''}
          </div>
        </div>
      </div>
      ${v.bio ? `<div class="hero-bio">${v.bio}</div>` : ''}
    </div>

    <div class="stats-bar fade-up-2">
      <div class="stat-cell">
        <div class="stat-val">${v.total_ventas_verified || '—'}</div>
        <div class="stat-lbl">Ventas verificadas</div>
      </div>
      <div class="stat-cell">
        <div class="stat-val">${v.total_resenas || '0'}</div>
        <div class="stat-lbl">Reseñas</div>
      </div>
      <div class="stat-cell">
        <div class="stat-val">${pct ? pct + '%' : '—'}</div>
        <div class="stat-lbl">Recomiendan</div>
      </div>
    </div>

    ${score > 0 ? `
    <div class="score-card fade-up-2">
      <div class="score-row">
        <div>
          <div class="score-title">⭐ Score de reputación</div>
          <div style="font-size:11px;color:var(--text3);margin-top:2px;">Basado en reseñas verificadas</div>
        </div>
        <div class="score-num">${score}</div>
      </div>
      <div class="score-bar-bg">
        <div class="score-bar-fill" style="width:${score}%"></div>
      </div>
      <div class="score-desc">${score >= 80 ? '✅ Excelente reputación' : score >= 60 ? '👍 Buena reputación' : 'En construcción'}</div>
    </div>` : ''}

    ${v.marcas_experiencia ? `
    <div class="section fade-up-3">
      <div class="section-title">Experiencia en marcas</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;">
        ${v.marcas_experiencia.split(',').map(m => `
          <div style="background:var(--s2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:600;color:var(--text2);">${m.trim()}</div>
        `).join('')}
      </div>
    </div>` : ''}

    ${autos && autos.length > 0 ? `
    <div class="section fade-up-3">
      <div class="section-title">🚗 Autos disponibles</div>
      <div style="display:flex;flex-direction:column;gap:8px;">
        ${autos.map(a => `
          <div style="background:var(--s1);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;">
            <div>
              <div style="font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--text);">${a.marca} ${a.modelo} ${a.anio}</div>
              <div style="font-size:11px;color:var(--text3);margin-top:2px;">${a.color || ''}</div>
            </div>
            <div style="text-align:right;">
              <div style="font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:var(--orange);">$${(a.precio_lista||0).toLocaleString('es-MX')}</div>
              ${a.mensualidad_min ? `<div style="font-size:10px;color:var(--text3);">desde $${a.mensualidad_min.toLocaleString('es-MX')}/mes</div>` : ''}
            </div>
          </div>
        `).join('')}
      </div>
    </div>` : ''}

    <div class="section fade-up-3">
      <div class="section-title">💬 Reseñas de clientes</div>
      ${(!resenas || resenas.length === 0)
        ? `<div class="resena-empty">Sin reseñas todavía — sé el primero en dejar una</div>`
        : resenas.map(r => `
          <div class="resena-card">
            <div class="resena-header">
              <div class="resena-stars">${estrellas(r.calificacion)}</div>
              <div class="resena-auto">${r.auto_comprado || ''}</div>
            </div>
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
              <div style="width:28px;height:28px;border-radius:50%;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;">
                ${r.anonima ? '🔒' : '👤'}
              </div>
              <div>
                <div style="font-size:12px;font-weight:600;color:var(--text);">
                  ${r.anonima ? 'Cliente anónimo' : (r.nombre_cliente || 'Cliente verificado')}
                </div>
                <div style="font-size:10px;color:var(--text3);">
                  Compra verificada en Ciérralo.mx ✅
                </div>
              </div>
            </div>
            <div class="resena-txt">${r.comentario || ''}</div>
            ${r.recomienda ? '<div style="font-size:10px;color:var(--green);margin-top:6px;">👍 Recomienda a este vendedor</div>' : ''}
          </div>
        `).join('')
      }
    </div>

    <div class="cta-section fade-up-3">
      <div class="cta-card">
        <div class="cta-title">¿Te interesa un auto?</div>
        <div class="cta-sub">Contáctame directo por WhatsApp y te asesoro sin compromiso.</div>
        ${wa ? `<a href="https://wa.me/${wa}?text=Hola%20${encodeURIComponent(v.nombre||'')}%2C%20vi%20tu%20perfil%20en%20Ci%C3%A9rralo.mx%20y%20me%20interesa%20un%20auto" class="cta-btn" target="_blank">💬 Escribir por WhatsApp</a>` : ''}
        <a href="https://transcendent-florentine-31c783.netlify.app" class="cta-btn-sec">¿Eres vendedor? Crea tu perfil gratis</a>
      </div>
    </div>

    <div class="footer">
      <div class="footer-logo">Ciérralo<span>.mx</span></div>
      <div class="footer-txt" style="margin-top:4px;">Conectando compradores con vendedores de confianza en México</div>
    </div>
  `;
}

cargarPerfil();
</script>
</body>
</html>
